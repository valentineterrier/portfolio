<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Valentine Terrier - Portfolio</title>

	<link rel="stylesheet" href="lightbox/dist/css/lightbox.css">
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<header>
		<h1>Valentine Terrier</h1>

		<div class="infos">
			<p id="date"></p>
			<p id="location-time"></p>
		</div>

		<button class="burger" id="burger">
			<span></span>
			<span></span>
			<span></span>
		</button>

		<div class="menu-overlay">
			<nav>
				<a href="#">Work</a>
				<a href="#">About</a>
				<a href="#">Contact</a>
			</nav>
		</div>
	</header>

	<section id="portfolio">

		<div class="project">
			<img src="images/Portfolio_affiche_tulipe_big.jpg" alt="project tulipe">
		</div>

		<div class="project">
			<img src="images/Portfolio_affiche_NIFFF_big.jpg" alt="project nifff">
		</div>

		<div class="project">
			<img src="images/Portfolio_affiche_ETML_big.jpg" alt="project etml">
		</div>

		<div class="project">
			<img src="images/Portfolio_Publico_big.jpg" alt="project publico">
		</div>


		<div class="project charmettes">
			<img src="images/Portfolio_logo_Charmettes_big.jpg" alt="project charmettes">
		</div>

		<div class="project fishchips">
			<img src="images/Portfolio_logo_FishandChips_big.jpg" alt="project fishchips">
		</div>

	</section>
	
	<script src="lightbox/dist/js/lightbox-plus-jquery.js"></script>
	<script>
		lightbox.option({
			'resizeDuration': 50,
			'fadeDuration': 50,
			'imageFadeDuration': 0,
			'showImageNumberLabel': false,
			'toujoursAfficherNavSurLesAppareilsTouch': true,
			'wrapAround': true
			}) </script>

	<style>
		:root{
			--lb-image-border-width: 0px;
			--lb-border-radius: 0px;
		}
	</style>

<script src="script.js"></script>
</body>
</html>
